<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>JSON配置生成器</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            padding: 30px;
            font-family: system-ui;
            max-width: 700px;
            margin: 0 auto;
            background: #f6f8fa;
        }
        .item {
            margin: 12px 0;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            margin-top: 10px;
            padding: 10px 24px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            font-family: Consolas, monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="item">
        <label>bb 版本号</label>
        <input id="bb" value="1.0">
    </div>
    <div class="item">
        <label>nr 提示文字</label>
        <input id="nr" value="更新啦">
    </div>
    <div class="item">
        <label>url 链接地址</label>
        <input id="url" value="https://qq.com">
    </div>

    <button id="createBtn">生成并下载 config.json</button>
    <p>生成内容预览：</p>
    <div id="result"></div>

    <script>
        const bbInput = document.getElementById('bb');
        const nrInput = document.getElementById('nr');
        const urlInput = document.getElementById('url');
        const createBtn = document.getElementById('createBtn');
        const resultBox = document.getElementById('result');

        createBtn.addEventListener('click', function() {
            const data = {
                bb: bbInput.value,
                nr: nrInput.value,
                url: urlInput.value
            };
            const jsonStr = JSON.stringify(data);
            resultBox.innerText = jsonStr;

            // 生成json文件下载
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const aTag = document.createElement('a');
            aTag.href = URL.createObjectURL(blob);
            aTag.download = 'config.json';
            document.body.appendChild(aTag);
            aTag.click();
            document.body.removeChild(aTag);
            URL.revokeObjectURL(aTag.href);
        })
    </script>
</body>
</html>
