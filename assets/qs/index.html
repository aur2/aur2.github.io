<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title></title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: system-ui, sans-serif;
}

body {
    padding: 30px;
    background: #f5f7fa;
    max-width: 700px;
    margin: 0 auto;
}

.box {
    margin: 14px 0;
}

label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}

input {
    width: 100%;
    padding: 10px;
    border: 1px #ddd solid;
    border-radius: 6px;
    font-size: 14px;
}

button {
    padding: 10px 22px;
    background: #3B71FE;
    color: #fff;
    border: none;
    border-radius: 6px;
    margin-top: 8px;
    cursor: pointer;
}

#preview {
    margin-top: 20px;
    background: #ffffff;
    padding: 16px;
    border-radius: 8px;
    font-family: Consolas, monospace;
    word-break: break-all;
}
</style>
</head>
<body>
<div id="formWrap">
    <div class="box">
        <label>bb 版本号</label>
        <input id="bb" value="">
    </div>
    <div class="box">
        <label>nr 更新提示</label>
        <input id="nr" value="">
    </div>
    <div class="box">
        <label>url 链接地址</label>
        <input id="url" value="">
    </div>
    <button id="copyBtn">复制单行JSON</button>
    <div id="preview"></div>
</div>

<script>
// 获取url参数
const params = new URLSearchParams(location.search);

// 默认数据
let configData = {
    bb: "",
    nr: "",
    url: ""
};

// 判断是否为更新接口模式 ?upd
if (params.has("upd")) {
    // 设置标题为当前访问链接
    document.title = window.location.href;
    // 清空页面，直接输出单行JSON
    document.body.innerText = JSON.stringify(configData);
} else {
    // 配置页面逻辑
    const bbIpt = document.getElementById("bb");
    const nrIpt = document.getElementById("nr");
    const urlIpt = document.getElementById("url");
    const copyBtn = document.getElementById("copyBtn");
    const previewBox = document.getElementById("preview");

    // 实时预览JSON
    function renderJson() {
        configData.bb = bbIpt.value;
        configData.nr = nrIpt.value;
        configData.url = urlIpt.value;
        const jsonText = JSON.stringify(configData);
        previewBox.innerText = jsonText;
    }

    // 输入监听实时更新预览
    bbIpt.addEventListener("input", renderJson);
    nrIpt.addEventListener("input", renderJson);
    urlIpt.addEventListener("input", renderJson);

    // 复制按钮
    copyBtn.addEventListener("click", function () {
        navigator.clipboard.writeText(previewBox.innerText);
        alert("JSON已复制到剪贴板");
    });

    // 初始化预览
    renderJson();
}
</script>
</body>
</html>
